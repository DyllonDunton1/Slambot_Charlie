slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Mode
    mode: mapping

    # Map
    resolution: 0.05
    max_laser_range: 3.5
    minimum_laser_range: 0.12

    # Timing / TF
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 60.0
    transform_publish_period: 0.05
    map_update_interval: 1.0

    # Charlie's current mapping baseline.
    # Local scan matching looked worse than pure wheel-odom mapping in tests, so
    # keep it off for map-building and leave loop closure enabled.
    use_scan_matching: false
    use_scan_barycenter: false

    # Explicit scan/link defaults
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 3.0

    # Motion thresholds
    minimum_travel_distance: 0.03
    minimum_travel_heading: 0.03

    # Matching search settings are still used by loop-closure logic and are kept
    # moderate even though local scan matching is disabled.
    correlation_search_space_dimension: 0.40
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.05

    # Fine matching
    distance_variance_penalty: 1.0
    angle_variance_penalty: 2.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2

    # Loop closure matching
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55

    occupancy_threshold: 0.1

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
