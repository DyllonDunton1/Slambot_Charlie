<!DOCTYPE html>
<html>
<head>
    <title>Charlie Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="dashboard">
        <section class="panel map-panel">
            <h2>Map</h2>
            <div class="placeholder">Map display coming later</div>
        </section>

        <section class="panel controls-panel">
            <h2>Controls</h2>

            <div class="controls">
                <button id="forward">Forward</button>
                <div>
                    <button id="left">Left</button>
                    <button id="stop" class="stop">STOP</button>
                    <button id="right">Right</button>
                </div>
                <button id="backward">Backward</button>
            </div>

            <label>
                Linear speed
                <input id="linear-speed" type="range" min="0.02" max="0.30" step="0.01" value="0.08">
                <span id="linear-speed-readout">0.08</span> m/s
            </label>

            <label>
                Angular speed
                <input id="angular-speed" type="range" min="0.10" max="1.50" step="0.05" value="0.60">
                <span id="angular-speed-readout">0.60</span> rad/s
            </label>
        </section>

        <section class="panel camera-panel">
            <h2>Camera</h2>
            <div class="camera-container">
                <img id="camera-feed" src="/api/video_feed" alt="Charlie camera feed">
            </div>
        </section>

        <section class="panel odom-panel">
            <h2>Odom / Status</h2>

            <div class="debug-log-controls">
                <button id="start-log">Start Log</button>
                <button id="stop-log">Stop Log</button>
                <button id="clear-log">Clear Log</button>
                <button id="download-log">Download CSV</button>
            </div>

            <div id="log-status" class="log-status">
                Log: idle
            </div>

            <pre id="status-readout">Loading...</pre>
        </section>
    </main>

    <script src="/static/main.js?v=2"></script>
</body>
</html>
