<!DOCTYPE html>
<html>
<head>
    <title>Charlie Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="dashboard">
        <section class="panel map-panel">
            <h2>Map</h2>

            <div class="map-controls">
                <button id="download-map">Download Map PNG</button>
            </div>

            <div id="map-status" class="map-status">
                Map: waiting
            </div>

            <div id="pose-status" class="pose-status">
                Pose: waiting
            </div>

            <div class="map-container">
                <img id="map-image" src="/api/map/image" alt="Charlie map">
                <div id="robot-marker">
                    <div class="robot-arrow"></div>
                </div>
            </div>
        </section>

        <section class="panel controls-panel">
            <h2>Controls</h2>

            <div class="controls">
                <button id="forward">Forward</button>
                <div>
                    <button id="left">Left</button>
                    <button id="stop" class="stop">STOP</button>
                    <button id="right">Right</button>
                </div>
                <button id="backward">Backward</button>
            </div>

            <label>
                Linear speed
                <input id="linear-speed" type="range" min="0.02" max="0.30" step="0.01" value="0.06">
                <span id="linear-speed-readout">0.06</span> m/s
            </label>

            <label>
                Angular speed
                <input id="angular-speed" type="range" min="0.10" max="1.50" step="0.05" value="0.25">
                <span id="angular-speed-readout">0.25</span> rad/s
            </label>

            <div class="tuning-panel">
                <h3>Tuning</h3>

                <label>
                    Kp
                    <input id="tuning-kp" type="number" step="0.001" value="0.85">
                </label>

                <label>
                    Ki
                    <input id="tuning-ki" type="number" step="0.001" value="0.03">
                </label>

                <label>
                    Wheel radius m
                    <input id="tuning-wheel-radius" type="number" step="0.0001" value="0.0410">
                </label>

                <label>
                    Wheel separation m
                    <input id="tuning-wheel-separation" type="number" step="0.0001" value="0.2210">
                </label>

                <div class="tuning-buttons">
                    <button id="apply-tuning">Apply All</button>
                    <button id="reset-integral">Reset Integral</button>
                </div>

                <div id="tuning-status" class="tuning-status">
                    Tuning: idle
                </div>
            </div>
        </section>

        <section class="panel camera-panel">
            <h2>Camera</h2>
            <div class="camera-container">
                <img id="camera-feed" src="/api/video_feed" alt="Charlie camera feed">
            </div>
        </section>

        <section class="panel odom-panel">
            <h2>Odom / Status</h2>

            <div class="debug-log-controls">
                <button id="start-log">Start Log</button>
                <button id="stop-log">Stop Log</button>
                <button id="clear-log">Clear Log</button>
                <button id="download-log">Download CSV</button>
            </div>

            <div id="log-status" class="log-status">
                Log: idle
            </div>

            <pre id="status-readout">Loading...</pre>
        </section>
    
    </main>

    <script src="/static/main.js?v=5"></script>
</body>
</html>
